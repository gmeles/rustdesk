name: Interlogic Build MacOS Arm

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  RUST_VERSION: "stable"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:

  # ══════════════════════════════════════════
  #  macOS ARM (Apple Silicon) - Signed + Notarized
  # ══════════════════════════════════════════
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          sed -i "" "s|RENDEZVOUS_SERVERS: \&\[&str\] = \&\[\"[^\"]*\"\]|RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$RENDEZVOUS_SERVER\"]|" \
            libs/hbb_common/src/config.rs
          sed -i "" "s|RS_PUB_KEY: \&str = \"[^\"]*\"|RS_PUB_KEY: \&str = \"$RS_PUB_KEY\"|" \
            libs/hbb_common/src/config.rs
          echo "=== Patch OK ==="
          grep "RENDEZVOUS_SERVERS\|RS_PUB_KEY" libs/hbb_common/src/config.rs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Flutter macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin
          components: rustfmt

      - name: Install dependencies
        run: |
          brew install libvpx aom opus nasm cmake pkg-config create-dmg
          # Χρήση system Xcode clang για bindgen (όχι brew LLVM)
          XCODE_TOOLCHAIN=$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr
          echo "LIBCLANG_PATH=${XCODE_TOOLCHAIN}/lib" >> $GITHUB_ENV
          echo "CC=${XCODE_TOOLCHAIN}/bin/clang" >> $GITHUB_ENV
          echo "CXX=${XCODE_TOOLCHAIN}/bin/clang++" >> $GITHUB_ENV
          git clone https://chromium.googlesource.com/libyuv/libyuv /tmp/libyuv
          cd /tmp/libyuv && mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_INSTALL_PREFIX=/opt/homebrew
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install
          sudo mkdir -p /opt/homebrew/Cellar/libyuv/HEAD/include
          sudo mkdir -p /opt/homebrew/Cellar/libyuv/HEAD/lib
          sudo cp -r /opt/homebrew/include/libyuv* /opt/homebrew/Cellar/libyuv/HEAD/include/ 2>/dev/null || true
          sudo cp /opt/homebrew/lib/libyuv* /opt/homebrew/Cellar/libyuv/HEAD/lib/ 2>/dev/null || true
          sudo mkdir -p /opt/homebrew/opt/libyuv
          sudo ln -sf /opt/homebrew/Cellar/libyuv/HEAD/include /opt/homebrew/opt/libyuv/include
          sudo ln -sf /opt/homebrew/Cellar/libyuv/HEAD/lib /opt/homebrew/opt/libyuv/lib
          echo "=== libyuv ==="
          ls /opt/homebrew/Cellar/libyuv/HEAD/lib/ 2>/dev/null || echo "NOT FOUND"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-${{ env.RUST_VERSION }}-

      - name: Install cargo-expand and flutter_rust_bridge_codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version "=1.80.1"

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Generate bridge
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart
          [ -f flutter/lib/generated_bridge.dart ] && echo "=== Bridge OK ===" || exit 1

      - name: Import Developer ID Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          echo "=== Certificate imported ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Patch scrap build.rs for arm64 bindgen
        run: |
          python3 - << 'PYEOF'
          import subprocess

          sdk = subprocess.check_output(['xcrun', '--show-sdk-path']).decode().strip()

          with open('libs/scrap/build.rs', 'r') as f:
              content = f.read()

          old = '    b.generate().unwrap().write_to_file(ffi_rs).unwrap();'
          new = f'''    // macOS arm64: explicit target for bindgen
              if std::env::var("CARGO_CFG_TARGET_OS").unwrap_or_default() == "macos"
                  && std::env::var("CARGO_CFG_TARGET_ARCH").unwrap_or_default() == "aarch64"
              {{
                  b = b.clang_arg("--target=arm64-apple-macos");
                  b = b.clang_arg("-mmacosx-version-min=11.0");
                  b = b.clang_arg("-isysroot{sdk}");
                  b = b.clang_arg(format!("-I{sdk}/usr/include"));
              }}
              b.generate().unwrap().write_to_file(ffi_rs).unwrap();'''

          if old in content:
              content = content.replace(old, new)
              with open('libs/scrap/build.rs', 'w') as f:
                  f.write(content)
              print('=== Patch applied successfully ===')
          else:
              print('ERROR: target string not found!')
              for i, line in enumerate(content.split('\n')):
                  if 'generate' in line:
                      print(f'Line {i}: {repr(line)}')
          PYEOF
                    echo "=== Verify patch ==="
                    grep -n "arm64\|isysroot\|clang_arg" libs/scrap/build.rs | head -20

                - name: Build macOS app
                  run: |
                    BREW_PREFIX=$(brew --prefix)
                    XCODE_PATH=$(xcode-select -p)

                    # Ρητή δήλωση linker για aarch64
                    mkdir -p .cargo
                    cat >> .cargo/config.toml << 'EOF'

          [target.aarch64-apple-darwin]
          linker = "clang"
          EOF

          export MACOSX_DEPLOYMENT_TARGET="11.0"
          export PATH="${XCODE_PATH}/Toolchains/XcodeDefault.xctoolchain/usr/bin:$PATH"
          export LIBRARY_PATH="${BREW_PREFIX}/lib"
          export PKG_CONFIG_PATH="${BREW_PREFIX}/lib/pkgconfig"
          export VPX_INCLUDE_PATH="${BREW_PREFIX}/include"
          export VPX_LIB_PATH="${BREW_PREFIX}/lib"
          export AOM_INCLUDE_PATH="${BREW_PREFIX}/include"
          export AOM_LIB_PATH="${BREW_PREFIX}/lib"
          rm -rf target/release/build/scrap-* 2>/dev/null || true
          python build.py --flutter

      - name: Sign app
        env:
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          APP_PATH=$(find flutter/build/macos/Build/Products/Release -name "*.app" | head -1)
          echo "Signing: $APP_PATH"
          find "$APP_PATH" \( -name "*.dylib" -o -name "*.framework" \) | while read f; do
            codesign --force --verify --verbose \
              --sign "Developer ID Application: G. MELESANAKIS & CO L.P. ($TEAM_ID)" \
              --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              "$f" || true
          done
          codesign --force --verify --verbose --deep \
            --sign "Developer ID Application: G. MELESANAKIS & CO L.P. ($TEAM_ID)" \
            --options runtime \
            --entitlements "${{ github.workspace }}/flutter/macos/Runner/DebugProfile.entitlements" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "=== Signing OK ==="

      - name: Create DMG
        run: |
          APP_PATH=$(find flutter/build/macos/Build/Products/Release -name "*.app" | head -1)
          create-dmg \
            --volname "Interlogic Support" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --app-drop-link 500 185 \
            "InterlogicSupport-arm64.dmg" \
            "$APP_PATH"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          echo "=== Submitting for notarization ==="
          xcrun notarytool submit "InterlogicSupport-arm64.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --timeout 30m
          echo "=== Stapling ==="
          xcrun stapler staple "InterlogicSupport-arm64.dmg"
          xcrun stapler validate "InterlogicSupport-arm64.dmg"
          echo "=== Notarization complete ==="

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-arm64
          path: InterlogicSupport-arm64.dmg
          retention-days: 30