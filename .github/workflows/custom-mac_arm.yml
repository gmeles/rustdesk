name: Interlogic Build MacOS Arm

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  RUST_VERSION: "stable"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:

 # ══════════════════════════════════════════
 #  macOS ARM (Apple Silicon) - Signed + Notarized
 # ══════════════════════════════════════════
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          sed -i "" "s|RENDEZVOUS_SERVERS: \&\[&str\] = \&\[\"[^\"]*\"\]|RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$RENDEZVOUS_SERVER\"]|" \
            libs/hbb_common/src/config.rs
          sed -i "" "s|RS_PUB_KEY: \&str = \"[^\"]*\"|RS_PUB_KEY: \&str = \"$RS_PUB_KEY\"|" \
            libs/hbb_common/src/config.rs
          echo "=== Patch OK ==="
          grep "RENDEZVOUS_SERVERS\|RS_PUB_KEY" libs/hbb_common/src/config.rs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Flutter macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin
          components: rustfmt

      - name: Install dependencies
        run: |
          brew install nasm cmake pkg-config llvm create-dmg
          LLVM_PATH=$(brew --prefix llvm)
          echo "LIBCLANG_PATH=$LLVM_PATH/lib" >> $GITHUB_ENV
          echo "PATH=$LLVM_PATH/bin:$PATH" >> $GITHUB_ENV
          # Βεβαιώσου ότι το clang του brew χρησιμοποιείται για bindgen
          echo "CC=$(brew --prefix llvm)/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm)/bin/clang++" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-${{ env.RUST_VERSION }}-
      
      - name: Export GitHub Actions cache vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg
          cd ~/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-macos-arm64-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: vcpkg-macos-arm64-

      - name: Install vcpkg dependencies
        run: |
          ~/vcpkg/vcpkg install \
            --classic \
            --triplet arm64-osx \
            --overlay-ports="${{ github.workspace }}/res/vcpkg" \
            libvpx \
            libyuv \
            opus \
            aom

      - name: Install cargo-expand and flutter_rust_bridge_codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version "=1.80.1"

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Generate bridge
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart
          [ -f flutter/lib/generated_bridge.dart ] && echo "=== Bridge OK ===" || exit 1

      - name: Import Developer ID Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          # Δημιουργία temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          echo "=== Certificate imported ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
   
      - name: Build macOS app
        run: |
          export VCPKG_INSTALLED="${VCPKG_ROOT}/installed/arm64-osx"
          export VCPKG_DEFAULT_TRIPLET="arm64-osx"
          export VCPKGRS_TRIPLET="arm64-osx"

          SDK=$(xcrun --show-sdk-path)

          # Κρίσιμο: explicit arm64 target για το bindgen
          export BINDGEN_EXTRA_CLANG_ARGS="\
            --target=arm64-apple-macos \
            -I${VCPKG_INSTALLED}/include \
            -isysroot ${SDK} \
            -I${SDK}/usr/include"

          export LIBRARY_PATH="${VCPKG_INSTALLED}/lib"
          export PKG_CONFIG_PATH="${VCPKG_INSTALLED}/lib/pkgconfig"

          # Βεβαίωση headers
          echo "=== VPX headers ==="
          ls "${VCPKG_INSTALLED}/include/vpx/" 2>/dev/null || echo "NOT FOUND"
          echo "=== AOM headers ==="
          ls "${VCPKG_INSTALLED}/include/aom/" 2>/dev/null || echo "NOT FOUND"

          python build.py --flutter

      - name: Sign app
        env:
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          APP_PATH=$(find flutter/build/macos/Build/Products/Release -name "*.app" | head -1)
          echo "Signing: $APP_PATH"

          # Sign όλα τα frameworks και dylibs πρώτα
          find "$APP_PATH" -name "*.dylib" -o -name "*.framework" | while read f; do
            codesign --force --verify --verbose \
              --sign "Developer ID Application: G. MELESANAKIS & CO L.P. ($TEAM_ID)" \
              --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              "$f" || true
          done

          # Sign το ίδιο το .app
          codesign --force --verify --verbose --deep \
            --sign "Developer ID Application: G. MELESANAKIS & CO L.P. ($TEAM_ID)" \
            --options runtime \
            --entitlements "${{ github.workspace }}/flutter/macos/Runner/DebugProfile.entitlements" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "=== Signing OK ==="

      - name: Create DMG
        run: |
          APP_PATH=$(find flutter/build/macos/Build/Products/Release -name "*.app" | head -1)
          create-dmg \
            --volname "Interlogic Support" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --app-drop-link 500 185 \
            "InterlogicSupport-arm64.dmg" \
            "$APP_PATH"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          echo "=== Submitting for notarization ==="
          xcrun notarytool submit "InterlogicSupport-arm64.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --timeout 30m

          echo "=== Stapling notarization ticket ==="
          xcrun stapler staple "InterlogicSupport-arm64.dmg"
          xcrun stapler validate "InterlogicSupport-arm64.dmg"
          echo "=== Notarization complete ==="

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-arm64
          path: InterlogicSupport-arm64.dmg
          retention-days: 30