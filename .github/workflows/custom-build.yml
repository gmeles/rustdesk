name: Custom RustDesk Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:

  # ══════════════════════════════════════════
  #  WINDOWS x64
  # ══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          MY_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          MY_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          $f = "libs/hbb_common/src/config.rs"
          $content = Get-Content $f -Raw
          $content = $content -replace 'RENDEZVOUS_SERVERS: &\[&str\] = &\["[^"]*"\]', "RENDEZVOUS_SERVERS: &[&str] = &[`"$env:MY_SERVER`"]"
          $content = $content -replace 'RS_PUB_KEY: &str = "[^"]*"', "RS_PUB_KEY: &str = `"$env:MY_KEY`""
          Set-Content $f $content
          Write-Host "Patched config.rs OK"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Enable Flutter Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Set LIBCLANG_PATH
        run: |
          $llvmPath = (Get-Command clang).Source | Split-Path
          echo "LIBCLANG_PATH=$llvmPath" >> $env:GITHUB_ENV
          Write-Host "Using LLVM at: $llvmPath"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $HOME/vcpkg
          & "$HOME/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $env:GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg dependencies
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install --triplet x64-windows-static

      - name: Download Sciter DLL
        run: |
          New-Item -ItemType Directory -Force -Path target/release
          Invoke-WebRequest `
            -Uri https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll `
            -OutFile target/release/sciter.dll

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Build Windows Release
        run: cd flutter && flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: flutter/build/windows/x64/runner/Release/
          retention-days: 30

  # ══════════════════════════════════════════
  #  ANDROID APK
  # ══════════════════════════════════════════
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          MY_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          MY_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          sed -i "s|RENDEZVOUS_SERVERS: \&\[&str\] = \&\[\"[^\"]*\"\]|RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$MY_SERVER\"]|" \
            libs/hbb_common/src/config.rs
          sed -i "s|RS_PUB_KEY: \&str = \"[^\"]*\"|RS_PUB_KEY: \&str = \"$MY_KEY\"|" \
            libs/hbb_common/src/config.rs
          echo "Patched config.rs OK"
          grep "RENDEZVOUS_SERVERS\|RS_PUB_KEY" libs/hbb_common/src/config.rs

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-linux-android
            armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version "^3"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set NDK env
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            libclang-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            clang cmake

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release \
            --target-platform android-arm64,android-arm \
            --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-arm64
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-armeabi-v7a
          path: flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30