name: Custom RustDesk Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  RUST_VERSION: "stable"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:

  # ══════════════════════════════════════════
  #  WINDOWS x64
  # ══════════════════════════════════════════
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          $f = "libs/hbb_common/src/config.rs"
          $content = Get-Content $f -Raw
          $content = $content -replace 'RENDEZVOUS_SERVERS: &\[&str\] = &\["[^"]*"\]', "RENDEZVOUS_SERVERS: &[&str] = &[`"$env:RENDEZVOUS_SERVER`"]"
          $content = $content -replace 'RS_PUB_KEY: &str = "[^"]*"', "RS_PUB_KEY: &str = `"$env:RS_PUB_KEY`""
          Set-Content $f $content
          Write-Host "=== Patch OK ==="
          Select-String "RENDEZVOUS_SERVERS|RS_PUB_KEY" $f

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Flutter Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Set LIBCLANG_PATH
        run: |
          $clangPath = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($clangPath) {
            $libclangDir = Split-Path $clangPath
            echo "LIBCLANG_PATH=$libclangDir" >> $env:GITHUB_ENV
            Write-Host "Found LLVM at: $libclangDir"
          } else {
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
            Write-Host "Using default LLVM path"
          }

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-${{ env.RUST_VERSION }}-

      # ── vcpkg ΠΡΙΝ το bridge gen ──────────────────────────
      - name: Export GitHub Actions cache vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $HOME/vcpkg
          cd $HOME/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          & "$HOME/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $env:GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-windows-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: vcpkg-windows-

      - name: Install vcpkg dependencies
        run: |
          # Χωρίς ffmpeg — δεν χρησιμοποιούμε --hwcodec
          & "$env:VCPKG_ROOT/vcpkg.exe" install `
            --classic `
            --triplet x64-windows-static `
            --overlay-ports="${{ github.workspace }}/res/vcpkg" `
            libvpx `
            libyuv `
            opus `
            aom

      # ── Bridge generation ─────────────────────────────────
      - name: Install cargo-expand and flutter_rust_bridge_codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version "=1.82.6"
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          $currentPath = [System.Environment]::GetEnvironmentVariable("PATH", "Machine")
          [System.Environment]::SetEnvironmentVariable("PATH", "$cargoBin;$currentPath", "Machine")
          $env:PATH = "$cargoBin;$env:PATH"
          echo $cargoBin >> $env:GITHUB_PATH
          Write-Host "Files in cargo bin:"
          Get-ChildItem "$cargoBin" | Where-Object { $_.Name -like "cargo*" -or $_.Name -like "flutter*" }

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Generate bridge
        run: |
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          $env:PATH = "$cargoBin;$env:PATH"
          [System.Environment]::SetEnvironmentVariable("PATH", "$cargoBin;$([System.Environment]::GetEnvironmentVariable('PATH','Machine'))", "Machine")
          Write-Host "cargo-expand exists: $(Test-Path $cargoBin\cargo-expand.exe)"
          Write-Host "frb_codegen exists:  $(Test-Path $cargoBin\flutter_rust_bridge_codegen.exe)"
          $proc = Start-Process `
            -FilePath "$cargoBin\flutter_rust_bridge_codegen.exe" `
            -ArgumentList "--rust-input","src/flutter_ffi.rs","--dart-output","flutter/lib/generated_bridge.dart" `
            -Environment @{
              PATH          = "$cargoBin;$env:PATH"
              CARGO_HOME    = "$env:USERPROFILE\.cargo"
              VCPKG_ROOT    = "$env:VCPKG_ROOT"
              LIBCLANG_PATH = "$env:LIBCLANG_PATH"
            } `
            -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Write-Error "flutter_rust_bridge_codegen failed with exit code $($proc.ExitCode)"
            exit 1
          }
          if (Test-Path flutter/lib/generated_bridge.dart) {
            Write-Host "=== Bridge generated OK ==="
          } else {
            Write-Error "Bridge file not created!"
            exit 1
          }
          (Get-Content flutter/lib/generated_bridge.dart) `
            -replace 'ffi.NativeFunction<ffi.Bool Function\(DartPort', `
                     'ffi.NativeFunction<ffi.Uint8 Function(DartPort' |
          Set-Content flutter/lib/generated_bridge.dart

      - name: Download Sciter DLL
        run: |
          New-Item -ItemType Directory -Force -Path target/release
          Invoke-WebRequest `
            -Uri https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll `
            -OutFile target/release/sciter.dll

      - name: Build RustDesk
        run: |
          # Χωρίς --hwcodec και --vram για να αποφύγουμε το ffmpeg dependency
          python build.py --portable --flutter --skip-portable-pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: flutter/build/windows/x64/runner/Release/
          retention-days: 30

  # ══════════════════════════════════════════
  #  ANDROID APK
  # ══════════════════════════════════════════
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          sed -i "s|RENDEZVOUS_SERVERS: \&\[&str\] = \&\[\"[^\"]*\"\]|RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$RENDEZVOUS_SERVER\"]|" \
            libs/hbb_common/src/config.rs
          sed -i "s|RS_PUB_KEY: \&str = \"[^\"]*\"|RS_PUB_KEY: \&str = \"$RS_PUB_KEY\"|" \
            libs/hbb_common/src/config.rs
          echo "=== Patch OK ==="
          grep "RENDEZVOUS_SERVERS\|RS_PUB_KEY" libs/hbb_common/src/config.rs

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libunwind-dev \
            libclang-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpam0g-dev \
            libopus-dev \
            nasm \
            clang cmake \
            pkg-config

      # ── vcpkg ΠΡΙΝ το bridge gen ──────────────────────────
      - name: Setup vcpkg for bridge gen
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth=1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          ~/vcpkg/vcpkg install \
            --classic \
            --triplet x64-linux \
            --overlay-ports="${{ github.workspace }}/res/vcpkg" \
            opus \
            libvpx \
            libyuv \
            aom
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-${{ env.RUST_VERSION }}-

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version "=1.82.6"

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Generate bridge
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart
          if [ -f flutter/lib/generated_bridge.dart ]; then
            echo "=== Bridge generated OK ==="
          else
            echo "Bridge file not created!"
            exit 1
          fi

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version "^3"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set NDK env
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release \
            --target-platform android-arm64,android-arm \
            --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-arm64
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-armeabi-v7a
          path: flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30