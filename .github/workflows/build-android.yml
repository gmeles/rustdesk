name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FLUTTER_VERSION: "3.24.5"

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          sed -i "s|RENDEZVOUS_SERVERS: \&\[&str\] = \&\[\"[^\"]*\"\]|RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$RENDEZVOUS_SERVER\"]|" \
            libs/hbb_common/src/config.rs
          sed -i "s|RS_PUB_KEY: \&str = \"[^\"]*\"|RS_PUB_KEY: \&str = \"$RS_PUB_KEY\"|" \
            libs/hbb_common/src/config.rs
          echo "=== Patch OK ==="
          grep "RENDEZVOUS_SERVERS\|RS_PUB_KEY" libs/hbb_common/src/config.rs

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust (host - for bridge codegen)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            libclang-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpam0g-dev \
            clang cmake \
            pkg-config

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version "^1.82"

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Generate bridge
        run: |
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version "^3"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set NDK env
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release \
            --target-platform android-arm64,android-arm \
            --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-arm64
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-armeabi-v7a
          path: flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30