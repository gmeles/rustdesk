name: Build Windows x64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  RUST_VERSION: "1.82"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  CARGO_NDK_VERSION: "3.1.2"

jobs:
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch server config
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          $f = "libs/hbb_common/src/config.rs"
          $content = Get-Content $f -Raw
          $content = $content -replace 'RENDEZVOUS_SERVERS: &\[&str\] = &\["[^"]*"\]', "RENDEZVOUS_SERVERS: &[&str] = &[`"$env:RENDEZVOUS_SERVER`"]"
          $content = $content -replace 'RS_PUB_KEY: &str = "[^"]*"', "RS_PUB_KEY: &str = `"$env:RS_PUB_KEY`""
          Set-Content $f $content
          Write-Host "=== Patch OK ==="
          Select-String "RENDEZVOUS_SERVERS|RS_PUB_KEY" $f

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Flutter Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Setup Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Set LIBCLANG_PATH
        run: |
          $clangPath = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($clangPath) {
            $libclangDir = Split-Path $clangPath
            echo "LIBCLANG_PATH=$libclangDir" >> $env:GITHUB_ENV
            Write-Host "Found LLVM at: $libclangDir"
          } else {
            # fallback στο default path
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
            Write-Host "Using default LLVM path"
          }


      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version "^1.82"

      - name: Generate bridge
        run: |
          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart
          # Fix DartPort bool type
          (Get-Content flutter/lib/generated_bridge.dart) `
            -replace 'ffi.NativeFunction<ffi.Bool Function\(DartPort', `
                     'ffi.NativeFunction<ffi.Uint8 Function(DartPort' |
          Set-Content flutter/lib/generated_bridge.dart

      - name: Export GitHub Actions cache vars for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $HOME/vcpkg
          cd $HOME/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          & "$HOME/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $env:GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-windows-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-${{ env.VCPKG_COMMIT_ID }}-

      - name: Install vcpkg dependencies
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install `
            --triplet x64-windows-static `
            --x-install-root="$env:VCPKG_ROOT/installed"

      - name: Flutter pub get
        run: cd flutter && flutter pub get

      - name: Build RustDesk
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: flutter/build/windows/x64/runner/Release/
          retention-days: 30